---
- name: Test Deployment
  hosts: webservers
  become: true

  tasks:
    - name: Update apt packages
      ansible.builtin.apt:
        update_cache: true

    - name: Install Nginx
      ansible.builtin.apt:
        name: nginx
        state: present

    - name: Enable Nginx
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: true

    - name: Create test page
      ansible.builtin.copy:
        dest: /var/www/html/index.html
        content: |
          <html>
            <body>
              <h1>🚀 Deployment Successful</h1>
              <h2>Terraform + GitHub Actions + Ansible</h2>
            </body>
          </html>
        mode: "0755"

    - name: Verify Nginx is running
      ansible.builtin.service:
        name: nginx
        state: started
