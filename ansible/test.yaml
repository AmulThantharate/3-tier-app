---
- name: Test Deployment
  hosts: webservers
  become: true

  tasks:
    - name: Update apt packages
      apt:
        update_cache: yes

    - name: Install Nginx
      apt:
        name: nginx
        state: present

    - name: Enable Nginx
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Create test page
      copy:
        dest: /var/www/html/index.html
        content: |
          <html>
            <body>
              <h1>🚀 Deployment Successful</h1>
              <h2>Terraform + GitHub Actions + Ansible</h2>
            </body>
          </html>

    - name: Verify Nginx is running
      service:
        name: nginx
        state: started
